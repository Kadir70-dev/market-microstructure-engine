name: CI

# Build the C++ engine + backtest and run the full test suite (C++ unit tests
# via CTest, Hermes Python tests via unittest). No secrets, no network feed —
# everything here is offline and deterministic.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake \
            libspdlog-dev libsqlite3-dev nlohmann-json3-dev \
            sqlite3 python3

      - name: Configure (CMake)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests (CTest — C++ unit tests + Hermes Python tests)
        run: ctest --test-dir build --output-on-failure

      - name: Smoke-check binaries exist
        run: |
          test -x build/engine
          test -x build/engine_backtest
          test -x build/unit_tests
          echo "All binaries built."

  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Build (Next.js — DEMO data, no DB needed)
        run: npm run build

  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ML deps
        run: pip install -r agent/research/requirements.txt

      - name: Run predictive baseline (synthetic — reproducible, no DB needed)
        run: |
          python -m agent.research.train --source synthetic
          test -f agent/research/results/model_results.json
          echo "ML pipeline reproduced; results written."
